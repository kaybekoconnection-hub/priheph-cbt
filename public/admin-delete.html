<!DOCTYPE html>
<html>

<head>
<title>Delete Subject Questions</title>
</head>

<body>

<h2>Delete Questions by Subject</h2>

<select id="class">

<option>JSS1</option>
<option>JSS2</option>
<option>JSS3</option>
<option>SS1</option>
<option>SS2</option>
<option>SS3</option>

</select>

<select id="subject">

<option>MATHEMATICS</option>
<option>ENGLISH</option>
<option>BIOLOGY</option>
<option>PHYSICS</option>
<option>CHEMISTRY</option>

</select>

<button onclick="deleteQuestions()">Delete Questions</button>

<p id="msg"></p>

<script>

async function deleteQuestions(){

const class_level = document.getElementById("class").value;
const subject = document.getElementById("subject").value;

if(!confirm("Delete ALL questions for this subject?")) return;

const res = await fetch("/delete-subject-questions",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
class_level,
subject
})

});

const data = await res.json();

if(data.success){

document.getElementById("msg").innerText="Questions deleted successfully";

}else{

document.getElementById("msg").innerText="Delete failed";

}

}

</script>

</body>

</html>
