<!DOCTYPE html>
<html>
<head>
  <title>Add Question</title>
</head>
<body>

<h2>Add Question</h2>

<select id="term">
  <option value="2nd Term Examination">2nd Term Examination</option>
</select><br><br>

<select id="class">
  <option>JSS1</option>
  <option>JSS2</option>
  <option>JSS3</option>
  <option>SS1</option>
  <option>SS2</option>
  <option>SS3</option>
</select><br><br>

<select id="subject">
  <option>ENGLISH</option>
  <option>MATHEMATICS</option>
</select><br><br>

<textarea id="question" placeholder="Enter Question"></textarea><br><br>

<input type="text" id="optionA" placeholder="Option A"><br><br>
<input type="text" id="optionB" placeholder="Option B"><br><br>
<input type="text" id="optionC" placeholder="Option C"><br><br>
<input type="text" id="optionD" placeholder="Option D"><br><br>

<select id="correctAnswer">
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="D">D</option>
</select><br><br>

<button onclick="addQuestion()">Add Question</button>

<h3 id="message"></h3>

<script>
function addQuestion() {
  fetch("http://localhost:3000/add-question", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      term: document.getElementById("term").value,
      class: document.getElementById("class").value,
      subject: document.getElementById("subject").value,
      question: document.getElementById("question").value,
      optionA: document.getElementById("optionA").value,
      optionB: document.getElementById("optionB").value,
      optionC: document.getElementById("optionC").value,
      optionD: document.getElementById("optionD").value,
      correctAnswer: document.getElementById("correctAnswer").value
    })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("message").innerText = data.message || data.error;
  });
}
</script>

</body>
</html>
