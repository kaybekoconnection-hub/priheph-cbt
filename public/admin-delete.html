<!DOCTYPE html>
<html>
<head>
<title>Delete Questions</title>

<style>
body{
font-family: Arial;
padding:40px;
background:#f4f4f4;
}

table{
width:100%;
border-collapse: collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:left;
}

button{
background:red;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}
</style>

</head>
<body>

<h2>Delete Questions</h2>

<table id="questionsTable">

<thead>
<tr>
<th>ID</th>
<th>Class</th>
<th>Subject</th>
<th>Question</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

async function loadQuestions(){

const res = await fetch("/get-questions");
const data = await res.json();

const table = document.querySelector("#questionsTable tbody");
table.innerHTML = "";

data.forEach(q=>{

table.innerHTML += `
<tr>
<td>${q.id}</td>
<td>${q.class_level}</td>
<td>${q.subject}</td>
<td>${q.question}</td>
<td>
<button onclick="deleteQuestion(${q.id})">Delete</button>
</td>
</tr>
`;

});

}

async function deleteQuestion(id){

if(!confirm("Delete this question?")) return;

await fetch("/delete-question",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({id})
});

loadQuestions();

}

loadQuestions();

</script>

</body>
</html>
